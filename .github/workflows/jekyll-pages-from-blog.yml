name: Deploy Jekyll Page From BLOG.md

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Recast Application Workspace/RestAPI/BLOG.md"
      - ".github/workflows/jekyll-pages-from-blog.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare Jekyll source from BLOG.md
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_MD="Recast Application Workspace/RestAPI/BLOG.md"
          SITE_SRC=".github/pages-src"
          BUILD_OUT=".github/pages-build"

          mkdir -p "$SITE_SRC"

          cat > "$SITE_SRC/_config.yml" <<'EOF'
          title: Recast REST API Blog
          description: Generated from BLOG.md
          markdown: kramdown
          kramdown:
            input: GFM
          EOF

          {
            cat <<'EOF'
          ---
          title: Recast REST API Blog
          ---

          EOF
            cat "$SOURCE_MD"
          } > "$SITE_SRC/index.md"

          mkdir -p "$BUILD_OUT"

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: .github/pages-src
          destination: .github/pages-build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .github/pages-build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
